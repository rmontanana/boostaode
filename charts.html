<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gr&aacute;ficos - BoostAODE vs AODE</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/charts.css">
</head>
<body>

    <!-- ====================================================================
         Navbar
         ==================================================================== -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20V10"></path>
                    <path d="M18 20V4"></path>
                    <path d="M6 20v-4"></path>
                </svg>
                <span>BoostAODE</span>
            </a>

            <div class="navbar-nav">
                <a href="index.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                    </svg>
                    Resultados
                </a>
                <a href="charts.html" class="nav-link active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    Gr&aacute;ficos
                </a>
                <a href="ai-prompt.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    Consulta IA
                </a>
            </div>

            <div class="navbar-actions">
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema">
                    <svg id="icon-sun" class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="icon-moon" class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- ====================================================================
         Main Content
         ==================================================================== -->
    <main class="container" id="main-content">

        <!-- Page Header -->
        <div class="page-header">
            <h1>Gr&aacute;ficos Interactivos</h1>
            <p>Visualizaci&oacute;n de resultados BoostAODE vs AODE</p>
        </div>

        <!-- Two-column Layout -->
        <div class="layout-sidebar">

            <!-- Sidebar: Chart Selector -->
            <aside class="sidebar">
                <div class="card" style="padding: var(--spacing-md);">
                    <h3 style="font-size: var(--font-size-sm); font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--spacing-sm);">Tipo de gr&aacute;fico</h3>
                    <div class="chart-selector" id="chart-selector">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </aside>

            <!-- Main: Chart Area -->
            <div class="chart-area">
                <div class="chart-container" id="chart-container">
                    <button class="chart-download" id="chart-download" onclick="downloadPNG()" title="Descargar como PNG">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        PNG
                    </button>
                    <h2 class="chart-title" id="chart-title">Cargando...</h2>
                    <div class="chart-controls" id="chart-controls">
                        <!-- Populated by JS when needed -->
                    </div>
                    <div class="chart-canvas-wrapper" id="chart-wrapper">
                        <canvas id="chart-canvas"></canvas>
                    </div>
                    <div class="chart-html-content hidden" id="chart-html"></div>
                    <p class="chart-description" id="chart-description"></p>
                </div>
            </div>

        </div>

    </main>

    <!-- ====================================================================
         Footer
         ==================================================================== -->
    <footer class="footer">
        <div class="footer-inner">
            <p>BoostAODE vs AODE &mdash; Experimento de comparaci&oacute;n pareada &mdash; 40 datasets, 5-fold &times; 5 repeticiones</p>
        </div>
    </footer>

    <!-- ====================================================================
         Loading Overlay
         ==================================================================== -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner spinner-lg"></div>
        <div class="loading-text">Cargando datos experimentales...</div>
    </div>

    <!-- ====================================================================
         Scripts
         ==================================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/data.js"></script>
    <script src="js/charts-page.js"></script>

</body>
</html>
